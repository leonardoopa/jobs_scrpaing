version: '3.8'

services:
  redis:
    image: redis:alpine
    container_name: redis_vagas
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  scraper:
    build: .
    container_name: Scraping_vagas
    depends_on:
      - redis
    env_file:
      - .env
    volumes:
      - ./:/app

volumes:
  redis_data:
